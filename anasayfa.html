<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SincApp - Dijital Eğitim Koçu Platformu</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');
        body { font-family: 'Nunito', sans-serif; margin: 0; background: #f8fafc; color: #1e293b; overflow-x: hidden; }
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 20px 50px; background: white; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .logo { font-size: 28px; font-weight: 900; color: #4f46e5; display: flex; align-items: center; gap: 10px;}
        .hero { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 80vh; text-align: center; background: linear-gradient(135deg, #f6ea8c 0%, #f7a9a8 100%); padding: 0 20px;}
        .hero h1 { font-size: 56px; font-weight: 900; color: #1e293b; margin-bottom: 20px; line-height: 1.2;}
        .hero p { font-size: 20px; font-weight: bold; color: #334155; margin-bottom: 40px; max-width: 600px;}
        .btn-group { display: flex; gap: 20px; }
        .btn { padding: 15px 30px; border-radius: 12px; font-size: 18px; font-weight: 900; text-decoration: none; transition: 0.3s; box-shadow: 0 10px 20px rgba(0,0,0,0.1);}
        .btn-ogr { background: #10b981; color: white; }
        .btn-ogr:hover { background: #059669; transform: translateY(-3px); }
        .btn-koc { background: #4f46e5; color: white; }
        .btn-koc:hover { background: #4338ca; transform: translateY(-3px); }
        @keyframes zippla { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        .sincap { font-size: 80px; animation: zippla 2.5s infinite; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="logo">🐿️ SincApp</div>
        <div style="font-weight: bold; color: #64748b;">Türkiye'nin En Akıllı Koçluk Ağı</div>
    </div>
    <div class="hero">
        <div class="sincap">🐿️</div>
        <h1>Eğitimi Oyunlaştır, Başarıyı Yakala.</h1>
        <p>LGS ve YKS maratonunda öğrencilerinizi XP'lerle motive edin, yapay zeka ile analiz yapın ve kendi dijital sınıfınızı saniyeler içinde kurun.</p>
        <div class="btn-group">
            <a href="login.html" class="btn btn-ogr">🎓 Öğrenci Girişi</a>
            <a href="ogretmen-login.html" class="btn btn-koc">👨‍🏫 Eğitmen Portalı</a>
        </div>
    </div>
</body>
</html>
