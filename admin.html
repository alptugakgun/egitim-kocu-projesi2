<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>SincApp Kurucu Paneli</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');
        body { font-family: 'Nunito', sans-serif; background: #0f172a; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .box { background: #1e293b; padding: 40px; border-radius: 20px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.5); width: 400px; border: 2px solid #3b82f6;}
        input { width: 90%; padding: 15px; border-radius: 10px; border: none; outline: none; font-size: 16px; font-weight: bold; text-align: center; margin-bottom: 20px; }
        button { width: 100%; padding: 15px; background: #3b82f6; color: white; border: none; border-radius: 10px; font-size: 18px; font-weight: 900; cursor: pointer; }
        .stats { display: none; margin-top: 30px; gap: 20px; justify-content: center;}
        .stat-box { background: #334155; padding: 20px; border-radius: 15px; width: 150px; }
        .stat-box h2 { margin: 0; font-size: 40px; color: #10b981; }
        .stat-box p { margin: 5px 0 0 0; font-weight: bold; color: #94a3b8; }
    </style>
</head>
<body>
    <div class="box">
        <h1 style="color: #60a5fa;">👑 SincApp God Mode</h1>
        <div id="loginDiv">
            <input type="password" id="adminPass" placeholder="Kurucu Şifresi">
            <button onclick="giris()">Sistemi Tarat</button>
        </div>
        <div class="stats" id="statsDiv">
            <div class="stat-box"><h2 id="kocCount">0</h2><p>Aktif Eğitmen</p></div>
            <div class="stat-box"><h2 id="ogrCount" style="color: #f59e0b;">0</h2><p>Toplam Öğrenci</p></div>
        </div>
    </div>
    <script>
        async function giris() {
            let s = document.getElementById('adminPass').value;
            const res = await fetch('/api/admin', { method: 'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({sifre: s}) });
            const data = await res.json();
            if(data.basari) {
                document.getElementById('loginDiv').style.display = 'none';
                document.getElementById('statsDiv').style.display = 'flex';
                document.getElementById('kocCount').innerText = data.data.koc;
                document.getElementById('ogrCount').innerText = data.data.ogr;
            } else { alert('Erişim Reddedildi!'); }
        }
    </script>
</body>
</html>
