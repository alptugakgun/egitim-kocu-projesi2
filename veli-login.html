<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veli Portalı Girişi - KatalizApp</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap');
        body { font-family: 'Nunito', sans-serif; background: linear-gradient(135deg, #e0e7ff 0%, #c7d2fe 100%); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.15); width: 350px; text-align: center; border-top: 6px solid #f59e0b;}
        h1 { color: #1e293b; margin-top: 0; font-weight: 900; font-size: 26px;}
        p { color: #64748b; margin-bottom: 25px; font-weight: bold;}
        input { width: 90%; padding: 14px; margin-bottom: 15px; border: 2px solid #e2e8f0; border-radius: 12px; font-family: inherit; font-weight: bold; outline: none; font-size:18px; text-align:center; letter-spacing:2px; color:#d97706; background:#fef3c7;}
        input:focus { border-color: #f59e0b; }
        button { width: 100%; padding: 14px; border: none; border-radius: 12px; font-weight: 900; font-size: 16px; cursor: pointer; color: white; background-color: #f59e0b; transition: 0.2s; font-family: inherit;}
        button:hover { background-color: #d97706; transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="login-card">
        <div style="font-size: 60px; margin-bottom: 10px;">👨‍👩‍👧‍👦</div>
        <h1>Veli Portalı</h1>
        <p>Öğrenci durumunu canlı takip et.</p>
        <input type="text" id="vKodu" placeholder="Veli Kodu (Örn: V-1234)">
        <button onclick="veliGiris()">Giriş Yap</button>
    </div>
    <script>
        async function veliGiris() {
            const kod = document.getElementById('vKodu').value.trim().toUpperCase();
            if(!kod) return alert("Lütfen çocuğunuzun panelinde bulunan Veli Takip Kodunu girin!");
            const response = await fetch('/api/veli/giris', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ veliKodu: kod }) });
            const data = await response.json();
            if(data.basari) { localStorage.setItem('veliKimligi', data.ogrenciAd); localStorage.setItem('kocKodu', data.kocKodu); window.location.href = 'veli.html'; } 
            else { alert(data.mesaj); }
        }
    </script>
</body>
</html>
