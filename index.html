<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SincApp - Öğrenci Paneli</title>
    <link rel="manifest" href="manifest.json">
    <script>if (!localStorage.getItem('ogrenciKimligi')) window.location.href = 'login.html';</script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap');
        body { font-family: 'Nunito', sans-serif; background: linear-gradient(135deg, #f6ea8c 0%, #f7a9a8 100%); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: rgba(255, 255, 255, 0.95); padding: 30px 40px; border-radius: 28px; box-shadow: 0 20px 40px rgba(0,0,0,0.15); width: 400px; text-align: center; border: 4px solid #fff; position: relative;}
        .logout-btn { background-color: #ffe4e6; color: #e11d48; border: none; padding: 8px 16px; border-radius: 14px; cursor: pointer; font-weight: 800; font-size: 13px; float: right; transition: all 0.3s ease;}
        .logout-btn:hover { background-color: #fecdd3; transform: translateY(-2px); }
        .avatar-btn { font-size: 40px; cursor: pointer; background: #f1f5f9; border-radius: 50%; width: 60px; height: 60px; display: inline-flex; justify-content: center; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-top: -10px;}
        h1 { color: #334155; margin-top: 10px; font-size: 22px; font-weight: 900;}
        .select-box { width: 100%; padding: 12px; border-radius: 12px; border: 2px solid #e2e8f0; font-family: inherit; font-weight: bold; color: #334155; font-size: 15px; margin-bottom: 15px; outline: none; }
        .mode-container { display: flex; gap: 10px; margin-bottom: 20px; align-items: center; }
        .mode-btn { flex: 1; padding: 10px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; transition: 0.2s; }
        .mode-active { background: #4f46e5; color: white; box-shadow: 0 4px 0 #3730a3; }
        .mode-passive { background: #e2e8f0; color: #64748b; }
        #display { font-size: 56px; font-weight: 900; color: #4f46e5; margin: 10px 0 25px 0; font-variant-numeric: tabular-nums; background: #e0e7ff; padding: 10px 30px; border-radius: 20px; display: inline-block; box-shadow: inset 0 4px 6px rgba(0,0,0,0.05); }
        .buttons { display: flex; gap: 15px; justify-content: center; }
        button.action-btn { flex: 1; padding: 16px; border: none; border-radius: 18px; font-weight: 800; font-size: 16px; cursor: pointer; color: white; transition: all 0.1s ease; }
        #startBtn { background-color: #10b981; box-shadow: 0 6px 0 #059669; }
        #startBtn:active { transform: translateY(6px); box-shadow: 0 0px 0 #059669; }
        #pauseBtn { background-color: #f59e0b; display: none; box-shadow: 0 6px 0 #d97706; }
        #pauseBtn:active { transform: translateY(6px); box-shadow: 0 0px 0 #d97706; }
        #statusText { margin-top: 20px; padding: 12px; border-radius: 14px; font-size: 15px; font-weight: 800; transition: 0.3s; }
        .task-board { margin-top: 30px; padding-top: 20px; border-top: 3px dashed #cbd5e1; text-align: left; display: none; }
        .task-board h3 { margin-top: 0; font-size: 18px; color: #4f46e5; font-weight: 900; display: flex; align-items: center; gap: 8px;}
        .task-item { display: flex; justify-content: space-between; align-items: center; background: #f8fafc; padding: 16px; border-radius: 16px; margin-bottom: 12px; border: 2px solid #e2e8f0; transition: all 0.3s; }
        .finish-btn { background: #3b82f6; color: white; border: none; padding: 8px 16px; border-radius: 10px; cursor: pointer; font-size: 14px; font-weight: 800; box-shadow: 0 4px 0 #2563eb; transition: all 0.1s; }
        .avatar-modal { display: none; position: absolute; top: 70px; left: 50%; transform: translateX(-50%); background: white; padding: 15px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); z-index: 100; gap: 10px; flex-wrap: wrap; width: 250px; justify-content: center; border: 3px solid #4f46e5;}
        .avatar-option { font-size: 35px; cursor: pointer; padding: 5px; border-radius: 10px; transition: 0.2s;}
        .avatar-option:hover { background: #e0e7ff; transform: scale(1.1);}
    </style>
</head>
<body>
    <audio id="bildirimSesi" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>
    <div class="container">
        <button class="logout-btn" onclick="cikisYap()">🚪 Çıkış</button>
        <div class="avatar-btn" id="aktifAvatar" onclick="toggleAvatarModal()">👤</div>
        <div class="avatar-modal" id="avatarModal">
            <div class="avatar-option" onclick="avatarSec('👤')">👤</div>
            <div class="avatar-option" onclick="avatarSec('👨‍🎓')">👨‍🎓</div>
            <div class="avatar-option" onclick="avatarSec('👩‍🎓')">👩‍🎓</div>
            <div class="avatar-option" onclick="avatarSec('🥷')">🥷</div>
            <div class="avatar-option" onclick="avatarSec('🦸‍♂️')">🦸‍♂️</div>
            <div class="avatar-option" onclick="avatarSec('🦸‍♀️')">🦸‍♀️</div>
            <div class="avatar-option" onclick="avatarSec('🧙‍♂️')">🧙‍♂️</div>
            <div class="avatar-option" onclick="avatarSec('👩‍🚀')">👩‍🚀</div>
        </div>
        <h1 id="mainTitle">🐿️ SincApp'e Hoş Geldin!</h1>
        <select id="dersSecimi" class="select-box">
            <option value="TYT Türkçe">📚 TYT Türkçe</option>
            <option value="TYT Matematik">📐 TYT Matematik</option>
            <option value="AYT Matematik">📈 AYT Matematik</option>
            <option value="AYT Fizik">⚛️ AYT Fizik</option>
            <option value="Paragraf">📝 Paragraf</option>
            <option value="Genel Deneme">⏱️ Genel Deneme</option>
        </select>
        <div class="mode-container">
            <button id="modeNormal" class="mode-btn mode-active" onclick="setMode('normal')">⏳ Kronometre</button>
            <button id="modePomo" class="mode-btn mode-passive" onclick="setMode('pomodoro')">🍅 Pomodoro</button>
            <input type="number" id="pomoInput" value="25" min="1" max="120" title="Dakika" style="width: 65px; padding: 10px; border-radius: 12px; border: 2px solid #e2e8f0; font-weight: 900; font-size: 16px; outline: none; text-align: center; display: none; color: #ef4444;">
        </div>
        <div id="display">00:00:00</div>
        <div class="buttons">
            <button id="startBtn" class="action-btn" onclick="startTimer()">▶ Başla</button>
            <button id="pauseBtn" class="action-btn" onclick="pauseTimer()">⏸ Mola Ver</button>
        </div>
        <div id="statusText"></div>
        <div class="task-board" id="taskBoard">
            <h3>🎯 Hedef Görevler</h3>
            <div id="studentTaskList"></div>
        </div>
    </div>
    
    <div style="position: fixed; bottom: 20px; left: 20px; width: 320px; background: white; border-radius: 16px; box-shadow: 0 10px 35px rgba(0,0,0,0.2); display: flex; flex-direction: column; overflow: hidden; z-index: 1000; font-family: 'Nunito', sans-serif;">
        <div style="background: linear-gradient(135deg, #8b5cf6 0%, #6d28d9 100%); color: white; padding: 15px; font-weight: 900; cursor: pointer; display: flex; justify-content: space-between; align-items: center;" onclick="toggleBot()"><span>🐿️ SincApp AI Koçum</span></div>
        <div id="botBody" style="height: 300px; background: #f8fafc; padding: 15px; overflow-y: auto; display: none; flex-direction: column;">
            <div style="align-self: flex-start; background: #e2e8f0; color: #1e293b; padding: 10px 14px; border-radius: 14px; font-size: 13px; max-width: 80%; line-height: 1.4; margin-bottom: 10px; font-weight: 700;">
                <div style="font-size: 10px; font-weight: 900; margin-bottom: 4px; opacity: 0.8;">🐿️ SincApp AI</div>
                Merhaba! Ben senin özel AI Asistanınım. Yorulduğunda bana yazabilir veya sistemi nasıl kullanacağını sorabilirsin!
            </div>
        </div>
        <div id="botFooter" style="padding: 10px; background: white; border-top: 1px solid #e2e8f0; display: none; gap: 8px;">
            <input type="text" id="botInput" placeholder="Sistem nasıl, taktik ver..." style="flex: 1; padding: 12px; border: 1px solid #cbd5e1; border-radius: 10px; outline: none; font-family: inherit;" onkeypress="if(event.key === 'Enter') botMesajGonder()">
            <button onclick="botMesajGonder()" style="background: #8b5cf6; color: white; border: none; padding: 12px 18px; border-radius: 10px; cursor: pointer; font-weight: 800; font-family: inherit;">Sor</button>
        </div>
    </div>

    <div style="position: fixed; bottom: 20px; right: 20px; width: 320px; background: white; border-radius: 16px; box-shadow: 0 10px 35px rgba(0,0,0,0.2); display: flex; flex-direction: column; overflow: hidden; z-index: 1000; font-family: 'Nunito', sans-serif;">
        <div style="background: #4f46e5; color: white; padding: 15px; font-weight: 900; cursor: pointer; display: flex; justify-content: space-between; align-items: center;" onclick="toggleChat()">
            <span>💬 Sınıf Sohbeti</span><span id="chatUyari" style="background: #ef4444; color: white; border-radius: 50%; width: 22px; height: 22px; display: none; align-items: center; justify-content: center; font-size: 12px;">!</span>
        </div>
        <div id="chatBody" style="height: 300px; background: #f8fafc; padding: 15px; overflow-y: auto; display: none; flex-direction: column;"></div>
        <div id="chatFooter" style="padding: 10px; background: white; border-top: 1px solid #e2e8f0; display: none; gap: 8px; align-items: center;">
            <input type="file" id="resimInput" accept="image/*" style="display: none;" onchange="resimGonder(this)">
            <button onclick="document.getElementById('resimInput').click()" style="background: none; border: none; font-size: 22px; cursor: pointer; padding: 0;" title="Fotoğraf Gönder">📎</button>
            <input type="text" id="chatInput" placeholder="Sınıfa yaz..." style="flex: 1; padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px; outline: none; font-family: inherit;" onkeypress="if(event.key === 'Enter') mesajGonder()">
            <button onclick="mesajGonder()" style="background: #10b981; color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; font-family: inherit;">Gönder</button>
        </div>
    </div>
    <script src="/socket.io/socket.io.js"></script>
    <script src="app.js?v=9"></script>
    <script>
        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('/sw.js'); }
        function cikisYap() { localStorage.removeItem('ogrenciKimligi'); window.location.href = 'login.html'; }
    </script>
</body>
</html>
