<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SincApp - Öğretmen Paneli</title>
    <script>if (!localStorage.getItem('ogretmenKimligi')) window.location.href = 'ogretmen-login.html';</script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f1f5f9; padding: 20px; color: #334155; margin: 0; }
        .header { margin-bottom: 20px; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center;}
        .davet-kodu { background: #fef3c7; color: #d97706; padding: 6px 15px; border-radius: 8px; font-weight: 900; font-size: 16px; border: 2px dashed #f59e0b; margin-left: 15px;}
        .btn-red { background-color: #ef4444; color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: bold;}
        .top-dashboard { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .box { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .box-title { font-size: 15px; font-weight: bold; color: #475569; margin-bottom: 15px; display: flex; align-items: center; justify-content: space-between;}
        .chart-container { position: relative; height: 180px; width: 100%; }
        .leaderboard-list { list-style: none; padding: 0; margin: 0; max-height: 180px; overflow-y: auto;}
        .leaderboard-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #f1f5f9; }
        .live-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        .live-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); display: flex; flex-direction: column; border-left: 6px solid #10b981; position: relative; }
        .task-input-row { display: flex; gap: 10px; margin-top: 15px; }
        .task-input-row input { flex: 1; padding: 8px; border: 1px solid #cbd5e1; border-radius: 6px; outline: none; }
        .task-input-row button { padding: 8px 12px; background: #3b82f6; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .task-list { list-style: none; padding: 0; margin-top: 10px; font-size: 13px; }
        .task-list li { margin-bottom: 6px; background: #f8fafc; padding: 8px 10px; border-radius: 4px; display: flex; align-items: center; gap: 8px; }
    </style>
</head>
<body>
    <div class="header">
        <h1 id="kocKarsilama">🐿️ SincApp Paneli</h1>
        <div><button class="btn-red" onclick="localStorage.clear(); window.location.href='ogretmen-login.html'">🚪 Çıkış</button></div>
    </div>
    
    <div class="top-dashboard">
        <div class="box"><div class="box-title">⏱️ Odaklanma</div><div class="chart-container"><canvas id="odakGrafigi"></canvas></div></div>
        <div class="box"><div class="box-title">📊 XP Dağılımı</div><div class="chart-container"><canvas id="barGrafigi"></canvas></div></div>
        
        <div class="box" style="grid-column: span 2;">
            <div class="box-title">📈 Öğrenci Net Gelişimi 
                <select id="netOgrenciSecici" onchange="netGrafigiCiz()" style="padding:5px; border-radius:5px; font-weight:bold; outline:none; border:1px solid #cbd5e1;">
                    <option value="">Öğrenci Seçin...</option>
                </select>
            </div>
            <div class="chart-container"><canvas id="lineGrafigi"></canvas></div>
        </div>
    </div>

    <div class="live-grid" id="liveGrid"></div>
    
    <script>
        const aktifKocIsmi = localStorage.getItem('ogretmenKimligi'); const kocKodu = localStorage.getItem('kocKodu');
        document.getElementById('kocKarsilama').innerHTML = `👨‍🏫 ${aktifKocIsmi} <span class="davet-kodu">Davet Kodun: ${kocKodu}</span>`;
        const socket = io(); socket.emit('join_room', kocKodu);

        let sinifListesi = [], odakGrafikObjesi = null, barGrafikObjesi = null, lineGrafikObjesi = null; 
        function unvanHesapla(xp) { return xp >= 300 ? '🏆 Efsane' : xp >= 150 ? '🔥 Odak Ustası' : xp >= 50 ? '⚡ Çalışkan' : '🌱 Çaylak'; }

        // 📈 Net Grafiğini Çizen Fonksiyon
        window.netGrafigiCiz = function() {
            let secilenAd = document.getElementById('netOgrenciSecici').value;
            if(!secilenAd) return;
            let ogrenci = sinifListesi.find(o => o.ogrenciAd === secilenAd);
            if(!ogrenci || !ogrenci.netler || ogrenci.netler.length === 0) {
                if(lineGrafikObjesi) { lineGrafikObjesi.data.labels = []; lineGrafikObjesi.data.datasets[0].data = []; lineGrafikObjesi.update(); }
                return;
            }
            let etiketler = ogrenci.netler.map(n => n.tarih + " (" + n.tur.split(' ')[0] + ")");
            let veriler = ogrenci.netler.map(n => n.net);

            if(lineGrafikObjesi) {
                lineGrafikObjesi.data.labels = etiketler; lineGrafikObjesi.data.datasets[0].data = veriler; lineGrafikObjesi.update();
            } else {
                const ctx = document.getElementById('lineGrafigi').getContext('2d');
                lineGrafikObjesi = new Chart(ctx, { type: 'line', data: { labels: etiketler, datasets: [{ label: 'Net Skoru', data: veriler, borderColor: '#10b981', backgroundColor: 'rgba(16, 185, 129, 0.2)', tension: 0.3, fill: true, pointRadius: 5 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } } });
            }
        };

        function verileriGuncelle() {
            // Net Grafiği İçin Seçiciyi Doldur
            let secici = document.getElementById('netOgrenciSecici'); let mevcutSecim = secici.value;
            secici.innerHTML = '<option value="">Öğrenci Seçin...</option>';
            sinifListesi.forEach(o => { secici.innerHTML += `<option value="${o.ogrenciAd}">${o.ogrenciAd}</option>`; });
            secici.value = mevcutSecim; netGrafigiCiz();

            // XP Bar Grafiği
            let siraliSinif = [...sinifListesi].sort((a, b) => (b.xp || 0) - (a.xp || 0));
            let isimler = siraliSinif.map(o => o.ogrenciAd.split(' ')[0]), xpler = siraliSinif.map(o => o.xp || 0);
            if (barGrafikObjesi) { barGrafikObjesi.data.labels = isimler; barGrafikObjesi.data.datasets[0].data = xpler; barGrafikObjesi.update(); } 
            else { barGrafikObjesi = new Chart(document.getElementById('barGrafigi').getContext('2d'), { type: 'bar', data: { labels: isimler, datasets: [{ label: 'Kazanılan XP', data: xpler, backgroundColor: '#3b82f6', borderRadius: 5 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } } }); }

            // Odak Grafiği
            let derste = sinifListesi.filter(o => o.mesaj && !o.mesaj.includes('Mola')).length, mola = sinifListesi.filter(o => o.mesaj && o.mesaj.includes('Mola')).length;
            if (odakGrafikObjesi) { odakGrafikObjesi.data.datasets[0].data = [derste, mola]; odakGrafikObjesi.update(); } 
            else { odakGrafikObjesi = new Chart(document.getElementById('odakGrafigi').getContext('2d'), { type: 'doughnut', data: { labels: ['Derste 🔥', 'Molada ☕'], datasets: [{ data: [derste, mola], backgroundColor: ['#10b981', '#f59e0b'] }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right' } } } }); }
        }

        // 🛒 YENİ: Market Bildirimi Dinleyici
        socket.on('ogretmene_market_bildirimi', (veri) => { alert(`🎉 MÜJDE! Öğrenciniz ${veri.ogrenci} marketten "${veri.odul}" satın aldı!`); });

        function kartiEkranaCiz(gelenVeri) {
            let molaMi = gelenVeri.mesaj && gelenVeri.mesaj.includes('Mola'), renkKodu = molaMi ? '#f59e0b' : '#10b981';
            let ogrenciID = "card-" + gelenVeri.ogrenciAd.replace(/\s+/g, '-'), timerID = "timer-card-" + gelenVeri.ogrenciAd.replace(/\s+/g, '-'), mevcutKart = document.getElementById(ogrenciID);

            if (mevcutKart) {
                mevcutKart.style.borderLeftColor = renkKodu;
                mevcutKart.querySelector('.student-name').innerHTML = `<span style="font-size:24px;">${gelenVeri.avatar || '👤'}</span> ${gelenVeri.ogrenciAd} <span style="font-size:12px; background:#f1f5f9; padding:2px 6px; border-radius:10px; color:#3b82f6;">${gelenVeri.xp || 0} XP</span>`;
                mevcutKart.querySelector('.student-task').innerText = gelenVeri.ders + ' ➔ ' + gelenVeri.mesaj;
            } else {
                const yeniKart = document.createElement('div'); yeniKart.className = 'live-card'; yeniKart.id = ogrenciID; yeniKart.style.borderLeftColor = renkKodu;
                yeniKart.innerHTML = `
                    <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
                        <div>
                            <div class="student-name"><span style="font-size:24px;">${gelenVeri.avatar || '👤'}</span> ${gelenVeri.ogrenciAd} <span style="font-size:12px; background:#f1f5f9; padding:2px 6px; border-radius:10px; color:#3b82f6;">${gelenVeri.xp || 0} XP</span></div>
                            <div class="student-task">${gelenVeri.ders} ➔ ${gelenVeri.mesaj}</div>
                        </div>
                        <div style="text-align: right;">
                            <div id="${timerID}" style="font-size: 22px; font-weight: 900; color: #4f46e5; font-variant-numeric: tabular-nums;">00:00:00</div>
                        </div>
                    </div>
                    <div class="task-input-row"><input type="text" id="gorevInput-${ogrenciID}" placeholder="Yeni görev ver..."><button onclick="gorevGonder('${gelenVeri.ogrenciAd}', '${ogrenciID}')">Ekle</button></div>
                    <ul class="task-list" id="gorevListesi-${ogrenciID}"></ul>`;
                document.getElementById('liveGrid').prepend(yeniKart);
            }
        }

        window.gorevGonder = function(ogrenciAd, ogrenciID) { let input = document.getElementById(`gorevInput-${ogrenciID}`); if(input.value.trim() !== '') { socket.emit('yeni_gorev_ekle', { ogrenciAd: ogrenciAd, gorevMetni: input.value, kocKodu: kocKodu }); input.value = ''; } };
        socket.on('ogretmene_sure_guncelle', (veri) => { let timerEl = document.getElementById("timer-card-" + veri.ogrenciAd.replace(/\s+/g, '-')); if(timerEl) timerEl.innerText = veri.sure; });
        socket.on('gorev_guncellendi', (tumVeriler) => {
            sinifListesi = tumVeriler; verileriGuncelle(); 
            tumVeriler.forEach(veri => {
                kartiEkranaCiz(veri); 
                let ogrenciID = "card-" + veri.ogrenciAd.replace(/\s+/g, '-'), listeElementi = document.getElementById(`gorevListesi-${ogrenciID}`);
                if(listeElementi && veri.gorevler) {
                    listeElementi.innerHTML = ''; 
                    veri.gorevler.forEach(g => { listeElementi.innerHTML += `<li style="${g.tamamlandi ? 'text-decoration: line-through; color: #94a3b8;' : 'color: #0f172a; font-weight: bold;'}">${g.tamamlandi ? '✅' : '⏳'} ${g.metin}</li>`; });
                }
            });
        });
        socket.on('eski_verileri_yukle', (gecmisListe) => { sinifListesi = gecmisListe; gecmisListe.forEach(veri => kartiEkranaCiz(veri)); if(sinifListesi.length > 0) verileriGuncelle(); });
        socket.on('ogretmene_canli_bildirim', (gelenVeri) => {
            kartiEkranaCiz(gelenVeri); let index = sinifListesi.findIndex(o => o.ogrenciAd === gelenVeri.ogrenciAd);
            if(index !== -1) { sinifListesi[index] = gelenVeri; } else { sinifListesi.push(gelenVeri); } verileriGuncelle();
        });
    </script>
</body>
</html>
