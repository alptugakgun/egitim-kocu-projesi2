<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eğitim Koçu - Öğretmen Paneli</title>
    <script>if (!localStorage.getItem('ogretmenKimligi')) window.location.href = 'ogretmen-login.html';</script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f1f5f9; padding: 20px; color: #334155; margin: 0; }
        .header { margin-bottom: 20px; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center;}
        .header h1 { margin: 0; color: #1e293b; font-size: 24px; }
        .logout-btn { background-color: #ef4444; color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s;}
        .logout-btn:hover { background-color: #dc2626; }

        .top-dashboard { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .box { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .box-title { font-size: 15px; font-weight: bold; color: #475569; margin-bottom: 15px; display: flex; align-items: center; gap: 8px;}
        .chart-container { position: relative; height: 180px; width: 100%; }

        .leaderboard-list { list-style: none; padding: 0; margin: 0; max-height: 180px; overflow-y: auto;}
        .leaderboard-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #f1f5f9; }
        .leaderboard-item:first-child { background-color: #fef9c3; border-radius: 8px; font-weight: bold; border-left: 4px solid #eab308;} 
        .leader-name { font-size: 14px; color: #1e293b; }
        .leader-xp { background: #3b82f6; color: white; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; }

        .live-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        .live-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); display: flex; flex-direction: column; border-left: 6px solid #10b981; animation: slideIn 0.5s ease-out; position: relative; }
        @keyframes slideIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        
        .card-top { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .student-name { font-weight: 800; font-size: 18px; color: #0f172a; }
        .student-task { color: #64748b; font-size: 14px; margin-top: 6px; font-weight: 500;}
        .live-status { display: flex; align-items: center; gap: 10px; font-weight: bold; font-size: 16px;}
        .pulse-dot { width: 12px; height: 12px; border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); } 70% { box-shadow: 0 0 0 12px rgba(16, 185, 129, 0); } 100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); } }
        .empty-state { color: #94a3b8; font-style: italic; padding: 20px; text-align: center; grid-column: span 2;}
        .task-section { margin-top: 15px; padding-top: 15px; border-top: 1px dashed #cbd5e1; width: 100%; }
        .task-input-row { display: flex; gap: 10px; }
        .task-input-row input { flex: 1; padding: 8px; border: 1px solid #cbd5e1; border-radius: 6px; outline: none; }
        .task-input-row button { padding: 8px 12px; background: #3b82f6; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .task-list { list-style: none; padding: 0; margin-top: 10px; font-size: 13px; }
        .task-list li { margin-bottom: 6px; background: #f8fafc; padding: 8px 10px; border-radius: 4px; display: flex; align-items: center; gap: 8px; }

        /* AI AI Butonu ve Modal */
        .ai-btn { background: linear-gradient(135deg, #8b5cf6 0%, #6d28d9 100%); color: white; border: none; padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 5px; box-shadow: 0 4px 10px rgba(139, 92, 246, 0.3); transition: 0.2s;}
        .ai-btn:hover { transform: scale(1.05); }
        .ai-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000; justify-content: center; align-items: center;}
        .ai-content { background: white; width: 400px; padding: 25px; border-radius: 16px; box-shadow: 0 20px 50px rgba(0,0,0,0.2); text-align: center;}
        .ai-close { background: #ef4444; color: white; border: none; padding: 8px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 20px;}
    </style>
</head>
<body>

    <audio id="bildirimSesi" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <div class="header">
        <h1 id="kocKarsilama">👨‍🏫 Canlı Eğitim Koçu Paneli</h1>
        <div style="display: flex; gap: 10px;">
            <button onclick="sifreleriGor()" style="background-color: #f59e0b; color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s;">🔐 Öğrenci Şifreleri</button>
            <button class="logout-btn" onclick="cikisYap()">🚪 Çıkış Yap</button>
        </div>
    </div>

    <div class="top-dashboard">
        <div class="box">
            <div class="box-title">⏱️ Sınıf Odaklanma Oranı</div>
            <div class="chart-container"><canvas id="odakGrafigi"></canvas></div>
        </div>
        <div class="box">
            <div class="box-title">📊 Öğrenci XP Dağılımı</div>
            <div class="chart-container"><canvas id="barGrafigi"></canvas></div>
        </div>
        <div class="box">
            <div class="box-title">🏆 Haftanın Şampiyonları</div>
            <ul class="leaderboard-list" id="leaderboardList"><li style="color: #94a3b8; text-align: center;">Kayıt yok...</li></ul>
        </div>
    </div>

    <div class="live-grid" id="liveGrid">
        <div class="empty-state" id="emptyState">Öğrenci verisi bekleniyor... ⏳</div>
    </div>

    <div class="ai-modal" id="aiModal">
        <div class="ai-content">
            <h2 style="margin-top:0; color: #6d28d9;">🤖 AI Asistan Analizi</h2>
            <p id="aiRaporMetni" style="font-size: 15px; color: #334155; line-height: 1.5;"></p>
            <button class="ai-close" onclick="document.getElementById('aiModal').style.display='none'">Kapat</button>
        </div>
    </div>

    <div class="ai-modal" id="sifreModal">
        <div class="ai-content" style="width: 500px; max-height: 80vh; overflow-y: auto;">
            <h2 style="margin-top:0; color: #f59e0b;">🔐 Gizli Kasa (Şifreler)</h2>
            <p style="font-size: 13px; color: #64748b; margin-bottom: 20px;">Öğrenciler şifresini unuttuğunda buradan bakıp iletebilirsiniz.</p>
            <table style="width: 100%; text-align: left; border-collapse: collapse; margin-bottom: 20px;">
                <thead>
                    <tr style="background: #f1f5f9; border-bottom: 2px solid #cbd5e1;">
                        <th style="padding: 10px;">Öğrenci Adı</th>
                        <th style="padding: 10px;">Şifresi</th>
                    </tr>
                </thead>
                <tbody id="sifreTablosu"></tbody>
            </table>
            <button class="ai-close" style="background: #64748b;" onclick="document.getElementById('sifreModal').style.display='none'">Gizle</button>
        </div>
    </div>

    <div style="position: fixed; bottom: 20px; right: 20px; width: 320px; background: white; border-radius: 12px; box-shadow: 0 10px 35px rgba(0,0,0,0.25); display: flex; flex-direction: column; overflow: hidden; z-index: 1000;">
        <div style="background: #1e293b; color: white; padding: 15px; font-weight: bold; cursor: pointer; display: flex; justify-content: space-between; align-items: center;" onclick="toggleChat()">
            <span>💬 Sınıf Sohbeti</span>
            <span id="chatUyari" style="background: #ef4444; color: white; border-radius: 50%; width: 22px; height: 22px; display: none; align-items: center; justify-content: center; font-size: 12px;">!</span>
        </div>
        <div id="chatBody" style="height: 300px; background: #f8fafc; padding: 15px; overflow-y: auto; display: none; flex-direction: column;"></div>
        <div id="chatFooter" style="padding: 10px; background: white; border-top: 1px solid #e2e8f0; display: none; gap: 8px;">
            <input type="text" id="chatInput" placeholder="Sınıfa yaz..." style="flex: 1; padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px; outline: none;" onkeypress="if(event.key === 'Enter') mesajGonder()">
            <button onclick="mesajGonder()" style="background: #3b82f6; color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: bold;">Gönder</button>
        </div>
    </div>

    <script>
        const aktifKocIsmi = localStorage.getItem('ogretmenKimligi');
        document.getElementById('kocKarsilama').innerText = `👨‍🏫 ${aktifKocIsmi} - Kontrol Paneli`;
        function cikisYap() { localStorage.removeItem('ogretmenKimligi'); window.location.href = 'ogretmen-login.html'; }
        function sesCal() { const s = document.getElementById('bildirimSesi'); s.currentTime = 0; s.play().catch(e=>{}); }

        const socket = io();
        const liveGrid = document.getElementById('liveGrid');
        const emptyState = document.getElementById('emptyState');
        const leaderboardList = document.getElementById('leaderboardList');
        
        let sinifListesi = []; 
        let odakGrafikObjesi = null; 
        let barGrafikObjesi = null; 

        function liderlikVeGrafikGuncelle() {
            let siraliSinif = [...sinifListesi].sort((a, b) => (b.xp || 0) - (a.xp || 0));
            leaderboardList.innerHTML = '';
            siraliSinif.forEach((ogrenci, index) => {
                if(ogrenci.xp > 0) {
                    let madalya = index === 0 ? '🥇' : index === 1 ? '🥈' : index === 2 ? '🥉' : '👤';
                    leaderboardList.innerHTML += `<li class="leaderboard-item"><span class="leader-name">${madalya} ${ogrenci.ogrenciAd}</span><span class="leader-xp">${ogrenci.xp} XP</span></li>`;
                }
            });
            if(leaderboardList.innerHTML === '') leaderboardList.innerHTML = '<li style="color: #94a3b8; text-align: center;">Puanlar bekleniyor...</li>';

            let isimler = siraliSinif.map(o => o.ogrenciAd.split(' ')[0]); 
            let xpler = siraliSinif.map(o => o.xp || 0);

            if (barGrafikObjesi) {
                barGrafikObjesi.data.labels = isimler;
                barGrafikObjesi.data.datasets[0].data = xpler;
                barGrafikObjesi.update();
            } else {
                const ctx2 = document.getElementById('barGrafigi').getContext('2d');
                barGrafikObjesi = new Chart(ctx2, {
                    type: 'bar',
                    data: { labels: isimler, datasets: [{ label: 'Kazanılan XP', data: xpler, backgroundColor: '#3b82f6', borderRadius: 5 }] },
                    options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true } }, plugins: { legend: { display: false } } }
                });
            }
        }

        function grafigiGuncelle() {
            let derste = sinifListesi.filter(o => !o.mesaj.includes('Mola')).length;
            let mola = sinifListesi.filter(o => o.mesaj.includes('Mola')).length;
            if (odakGrafikObjesi) {
                odakGrafikObjesi.data.datasets[0].data = [derste, mola];
                odakGrafikObjesi.update();
            } else {
                const ctx = document.getElementById('odakGrafigi').getContext('2d');
                odakGrafikObjesi = new Chart(ctx, {
                    type: 'doughnut',
                    data: { labels: ['Derste 🔥', 'Molada ☕'], datasets: [{ data: [derste, mola], backgroundColor: ['#10b981', '#f59e0b'] }] },
                    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right' } } }
                });
            }
        }

        function gorevGonder(ogrenciAd, ogrenciID) {
            let input = document.getElementById(`gorevInput-${ogrenciID}`);
            if(input.value.trim() !== '') {
                socket.emit('yeni_gorev_ekle', { ogrenciAd: ogrenciAd, gorevMetni: input.value });
                input.value = ''; 
            }
        }

        window.aiAnalizIste = function(ogrenciAd) {
            socket.emit('yapay_zeka_analiz_istegi', ogrenciAd);
        };

        socket.on('yapay_zeka_raporu', (veri) => {
            document.getElementById('aiRaporMetni').innerText = veri.rapor;
            document.getElementById('aiModal').style.display = 'flex';
        });

        async function sifreleriGor() {
            try {
                const response = await fetch('/api/sifreler');
                const ogrenciler = await response.json();
                
                const tablo = document.getElementById('sifreTablosu');
                tablo.innerHTML = '';
                
                if(ogrenciler.length === 0) {
                    tablo.innerHTML = `<tr><td colspan="2" style="padding: 10px; text-align: center; color: #94a3b8;">Henüz kayıtlı öğrenci yok.</td></tr>`;
                } else {
                    ogrenciler.forEach(ogr => {
                        let okunurSifre = ogr.sifre ? ogr.sifre : "Şifre Belirlenmemiş";
                        tablo.innerHTML += `
                            <tr style="border-bottom: 1px solid #e2e8f0;">
                                <td style="padding: 10px; font-weight: bold; color: #334155;">${ogr.ogrenciAd}</td>
                                <td style="padding: 10px; font-family: monospace; font-size: 15px; color: #ef4444; font-weight: bold;">${okunurSifre}</td>
                            </tr>
                        `;
                    });
                }
                document.getElementById('sifreModal').style.display = 'flex';
            } catch (e) {
                alert("Şifreler çekilirken bir hata oluştu!");
            }
        }

        function kartiEkranaCiz(gelenVeri) {
            if(emptyState) emptyState.style.display = 'none';
            let molaMi = gelenVeri.mesaj.includes('Mola');
            let renkKodu = molaMi ? '#f59e0b' : '#10b981';
            let durumYazisi = molaMi ? 'MOLA VERDİ' : 'CANLI AKTİVİTE';
            let ogrenciID = "card-" + gelenVeri.ogrenciAd.replace(/\s+/g, '-');
            let timerID = "timer-card-" + gelenVeri.ogrenciAd.replace(/\s+/g, '-');
            let mevcutKart = document.getElementById(ogrenciID);

            if (mevcutKart) {
                mevcutKart.style.borderLeftColor = renkKodu;
                mevcutKart.querySelector('.student-task').innerText = gelenVeri.ders + ' ➔ ' + gelenVeri.mesaj;
                mevcutKart.querySelector('.live-status').style.color = renkKodu;
                mevcutKart.querySelector('.pulse-dot').style.backgroundColor = renkKodu;
                mevcutKart.querySelector('.live-status span').innerText = durumYazisi;
                let xpGosterge = mevcutKart.querySelector('.card-xp');
                if(xpGosterge) xpGosterge.innerText = `${gelenVeri.xp || 0} XP`;
            } else {
                const yeniKart = document.createElement('div');
                yeniKart.className = 'live-card';
                yeniKart.id = ogrenciID;
                yeniKart.style.borderLeftColor = renkKodu;
                yeniKart.innerHTML = `
                    <div class="card-top">
                        <div>
                            <div class="student-name">${gelenVeri.ogrenciAd} <span class="card-xp" style="font-size:12px; background:#f1f5f9; padding:2px 6px; border-radius:10px; color:#3b82f6;">${gelenVeri.xp || 0} XP</span></div>
                            <div class="student-task">${gelenVeri.ders} ➔ ${gelenVeri.mesaj}</div>
                            <button class="ai-btn" style="margin-top: 8px;" onclick="aiAnalizIste('${gelenVeri.ogrenciAd}')">🤖 AI Analiz Raporu</button>
                        </div>
                        <div style="text-align: right;">
                            <div id="${timerID}" style="font-size: 22px; font-weight: 900; color: #4f46e5; font-variant-numeric: tabular-nums; margin-bottom: 5px;">00:00:00</div>
                            <div class="live-status" style="color: ${renkKodu}; justify-content: flex-end;">
                                <div class="pulse-dot" style="background-color: ${renkKodu}"></div>
                                <span>${durumYazisi}</span>
                            </div>
                        </div>
                    </div>
                    <div class="task-section">
                        <div class="task-input-row">
                            <input type="text" id="gorevInput-${ogrenciID}" placeholder="Yeni görev ver...">
                            <button onclick="gorevGonder('${gelenVeri.ogrenciAd}', '${ogrenciID}')">Ekle</button>
                        </div>
                        <ul class="task-list" id="gorevListesi-${ogrenciID}"></ul>
                    </div>
                `;
                liveGrid.prepend(yeniKart);
            }
        }

        socket.on('ogretmene_sure_guncelle', (veri) => {
            let timerEl = document.getElementById("timer-card-" + veri.ogrenciAd.replace(/\s+/g, '-'));
            if(timerEl) timerEl.innerText = veri.sure;
        });

        socket.on('gorev_guncellendi', (tumVeriler) => {
            sinifListesi = tumVeriler; 
            liderlikVeGrafikGuncelle(); 
            
            tumVeriler.forEach(veri => {
                kartiEkranaCiz(veri); 
                let ogrenciID = "card-" + veri.ogrenciAd.replace(/\s+/g, '-');
                let listeElementi = document.getElementById(`gorevListesi-${ogrenciID}`);
                
                if(listeElementi && veri.gorevler) {
                    let tamamlananSayisi = veri.gorevler.filter(g => g.tamamlandi).length;
                    let eskiTamamlanan = listeElementi.getAttribute('data-count') || 0;
                    if(tamamlananSayisi > eskiTamamlanan) sesCal(); 
                    listeElementi.setAttribute('data-count', tamamlananSayisi);

                    listeElementi.innerHTML = ''; 
                    veri.gorevler.forEach(gorev => {
                        let ikon = gorev.tamamlandi ? '✅' : '⏳';
                        let ustCizgi = gorev.tamamlandi ? 'text-decoration: line-through; color: #94a3b8;' : 'color: #0f172a; font-weight: bold;';
                        listeElementi.innerHTML += `<li style="${ustCizgi}">${ikon} ${gorev.metin}</li>`;
                    });
                }
            });
        });

        socket.on('eski_verileri_yukle', (gecmisListe) => {
            sinifListesi = gecmisListe; 
            gecmisListe.forEach(veri => kartiEkranaCiz(veri)); 
            if(sinifListesi.length > 0) { grafigiGuncelle(); liderlikVeGrafikGuncelle(); }
        });

        socket.on('ogretmene_canli_bildirim', (gelenVeri) => {
            kartiEkranaCiz(gelenVeri); 
            let index = sinifListesi.findIndex(o => o.ogrenciAd === gelenVeri.ogrenciAd);
            if(index !== -1) { sinifListesi[index] = gelenVeri; } 
            else { sinifListesi.push(gelenVeri); }
            grafigiGuncelle(); 
            liderlikVeGrafikGuncelle();
        });

        function toggleChat() {
            const body = document.getElementById('chatBody'), footer = document.getElementById('chatFooter'), uyari = document.getElementById('chatUyari');
            if(body.style.display === 'flex') { body.style.display = 'none'; footer.style.display = 'none'; } 
            else { body.style.display = 'flex'; footer.style.display = 'flex'; uyari.style.display = 'none'; body.scrollTop = body.scrollHeight; }
        }
        function mesajGonder() {
            const input = document.getElementById('chatInput');
            if(input.value.trim() !== '') { socket.emit('chat_mesaji_gonder', { gonderen: aktifKocIsmi, mesaj: input.value, rol: 'koc' }); input.value = ''; }
        }
        function chatEkranaBas(veri) {
            const body = document.getElementById('chatBody');
            let benMiyim = (veri.gonderen === aktifKocIsmi);
            let renk = benMiyim ? '#3b82f6' : '#e2e8f0', yaziRengi = benMiyim ? 'white' : '#1e293b', hizalama = benMiyim ? 'flex-end' : 'flex-start', ikon = veri.rol === 'koc' ? '👨‍🏫' : '🎓';
            body.innerHTML += `<div style="align-self: ${hizalama}; background: ${renk}; color: ${yaziRengi}; padding: 10px 14px; border-radius: 12px; font-size: 13px; max-width: 80%; line-height: 1.4; margin-bottom: 10px;"><div style="font-size: 10px; font-weight: bold; margin-bottom: 4px; opacity: 0.8;">${ikon} ${veri.gonderen} • ${veri.saat}</div>${veri.mesaj}</div>`;
            body.scrollTop = body.scrollHeight;
        }
        socket.on('eski_chat_yukle', (gecmis) => { document.getElementById('chatBody').innerHTML = ''; gecmis.forEach(msg => chatEkranaBas(msg)); });
        socket.on('yeni_chat_mesaji', (msg) => {
            chatEkranaBas(msg);
            const body = document.getElementById('chatBody');
            if(msg.gonderen !== aktifKocIsmi) { sesCal(); if(body.style.display !== 'flex') document.getElementById('chatUyari').style.display = 'flex'; }
        });
    </script>
</body>
</html>
